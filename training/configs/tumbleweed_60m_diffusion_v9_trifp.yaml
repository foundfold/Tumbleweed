run_id: tumbleweed_60m_diffusion_v9_trifp

# v9 = v5_film (the conditioning WINNER) + TriFP prediction-fingerprint as an ADDITIONAL,
# binding-aware conditioning signal. Raw ESM-2 is structure-only and target-agnostic to aptamers;
# the TriFP fingerprint (predicted log10 Kd of a fixed 812-aptamer reference panel against the
# target) is a dense, TASK-aware target rep — "what kind of aptamers bind this target." We project
# it to d_model and ADD it (zero-init gate) to the target rep that feeds BOTH the prepend token and
# the FiLM source, so the denoiser is conditioned on binding-aware info, not just structure.
# Zero gate → exact v5_film at init (residual-safe no-op); the model learns how much to lean on it.
# Everything else identical to v5_film (same corpus/balance/CENTERED mean-pool bank/lam_diff=0.5).
data:
  families:
  - name: rapt_tg2
    rounds_glob: ~/Desktop/autoRNA_data/tumbleweed/raptranker/PRJDB9110_TG2/processed/DRR*.parquet
    target_uniprot: P21980      # TGM2
    chemistry: RNA
    r_max: 8

  - name: rapt_a
    rounds_glob: ~/Desktop/autoRNA_data/tumbleweed/raptscore_selex/processed/A_R*.parquet
    target_uniprot: P31371      # FGF9
    chemistry: RNA
    r_max: 6

  - name: rapt_b
    rounds_glob: ~/Desktop/autoRNA_data/tumbleweed/raptscore_selex/processed/B_R*.parquet
    target_uniprot: Q01638      # IL1RL1
    chemistry: RNA
    r_max: 7

  - name: rapt_c
    rounds_glob: ~/Desktop/autoRNA_data/tumbleweed/raptscore_selex/processed/C_R*.parquet
    target_uniprot: P31371      # FGF9 (independent campaign)
    chemistry: RNA
    r_max: 7

  - name: rapidselex_parp1
    rounds_glob: ~/Desktop/autoRNA_data/tumbleweed/rapidselex/processed/rapidselex_PARP1_R*.parquet
    target_uniprot: P09874      # PARP1
    chemistry: RNA
    r_max: 12

  - name: rapidselex_mecp2
    rounds_glob: ~/Desktop/autoRNA_data/tumbleweed/rapidselex/processed/rapidselex_MECP2_R*.parquet
    target_uniprot: P51608      # MECP2
    chemistry: RNA
    r_max: 12

  - name: alphasyn_s1
    rounds_glob: ~/Desktop/autoRNA_data/tumbleweed/alphasyn/processed/alphasyn_S1_R*.parquet
    target_uniprot: P37840      # SNCA (alpha-synuclein); 2'F-pyrimidine RNA
    chemistry: RNA
    r_max: 15

  target_embeddings_parquet: ~/Tumbleweed/data_refs/target_protein_embeddings_centered.parquet
  trifp_fingerprint_parquet: ~/Tumbleweed/data_refs/trifp_fingerprint_bank.parquet
  winners_parquet: ~/Tumbleweed/data_refs/kdbench_winners_hybrid.parquet
  winner_round: 4
  winner_r_max: 5
  winner_repeat: 50
  max_rows_per_family: 50000
  ckpt_dir: ~/Desktop/autoRNA_data/tumbleweed/training_runs

model:
  d_model: 768
  nhead: 12
  num_layers: 8
  dim_ff: 3072
  dropout: 0.1
  embed_dim: 256
  max_len: 96
  target_embed_dim: 1280
  use_target_token: true
  target_film: true
  trifp_dim: 812                # NEW vs v5_film: TriFP prediction-fingerprint conditioning (panel size)
  grad_checkpoint: false

training:
  batch_size: 128
  steps: 20000
  lr: 3.0e-4
  weight_decay: 0.05
  betas: [0.9, 0.95]
  grad_clip: 1.0
  amp: true
  lam_diff: 0.5
  mask_same_target: true
  ckpt_every: 2500
