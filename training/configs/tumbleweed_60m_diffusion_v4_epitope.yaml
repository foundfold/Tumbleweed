run_id: tumbleweed_60m_diffusion_v4_epitope
seed: 0

# v4 = epitope-aware target conditioning (task #96).
# Replaces the whole-protein mean-pool ESM-2 conditioning vector with a learnable
# ATTENTION-POOL over per-residue ESM-2 (P,1280). Motivation: mean-pool can't tell
# same-family targets apart (CXCL5 P42830 vs IL-8 P10145 cos 0.972) because aptamers
# bind an epitope, not the whole chain. A learnable query over the residues lets the
# model attend to the binding surface instead of averaging it away.
#
# Model: target_pool=attn (+6.6M params for pool_query/pool_attn/pool_norm). The pooled
# vector then feeds the SAME target_contrast + projection heads, so the rest is unchanged.
# Bank: RAW per-residue ESM-2 (NOT centered) — the attention-pool + pool_norm LayerNorm
# learn their own decorrelation, so the mean-pool anisotropy fix (centering) is moot here.
#
# DATA BALANCE: must reproduce v2_kdbench's winning ~12%-winner mix. v2/v3 shared this yaml;
# the only difference was a per-FILE vs per-FAMILY cap bug (now fixed in train code). Under
# the fixed per-FAMILY cap, max_rows_per_family=50000 keeps ~all deep SELEX (~240k rows) so
# winners (630 × 50 ≈ 31.5k) land at ~12% — the v2 balance, NOT v3's regressed 47%.
# Held-out zero-shot probes LOX1 (P78380) / CXCL5 (P42830) still NOT in the Kd pool.
data:
  families:
  - name: rapt_tg2
    rounds_glob: ~/Desktop/autoRNA_data/tumbleweed/raptranker/PRJDB9110_TG2/processed/DRR*.parquet
    target_uniprot: P21980      # TGM2
    chemistry: RNA
    r_max: 8

  - name: rapt_a
    rounds_glob: ~/Desktop/autoRNA_data/tumbleweed/raptscore_selex/processed/A_R*.parquet
    target_uniprot: P31371      # FGF9
    chemistry: RNA
    r_max: 6

  - name: rapt_b
    rounds_glob: ~/Desktop/autoRNA_data/tumbleweed/raptscore_selex/processed/B_R*.parquet
    target_uniprot: Q01638      # IL1RL1
    chemistry: RNA
    r_max: 7

  - name: rapt_c
    rounds_glob: ~/Desktop/autoRNA_data/tumbleweed/raptscore_selex/processed/C_R*.parquet
    target_uniprot: P31371      # FGF9 (independent campaign)
    chemistry: RNA
    r_max: 7

  - name: rapidselex_parp1
    rounds_glob: ~/Desktop/autoRNA_data/tumbleweed/rapidselex/processed/rapidselex_PARP1_R*.parquet
    target_uniprot: P09874      # PARP1
    chemistry: RNA
    r_max: 12

  - name: rapidselex_mecp2
    rounds_glob: ~/Desktop/autoRNA_data/tumbleweed/rapidselex/processed/rapidselex_MECP2_R*.parquet
    target_uniprot: P51608      # MECP2
    chemistry: RNA
    r_max: 12

  - name: alphasyn_s1
    rounds_glob: ~/Desktop/autoRNA_data/tumbleweed/alphasyn/processed/alphasyn_S1_R*.parquet
    target_uniprot: P37840      # SNCA (alpha-synuclein); 2'F-pyrimidine RNA
    chemistry: RNA
    r_max: 15

  target_embeddings_parquet: ~/Desktop/autoRNA_data/tumbleweed/data_refs/target_protein_embeddings_per_residue.parquet
  winners_parquet: ~/Tumbleweed/data_refs/kdbench_winners_hybrid.parquet
  winner_round: 4               # → t = 1 - 4/5 = 0.2 (mild noise; converged binders)
  winner_r_max: 5
  winner_repeat: 50             # ~630 binders × 50 = ~31.5k rows ≈ 12% of corpus (v2 balance)
  max_rows_per_family: 50000    # high cap → keep ~all deep SELEX (~240k) so winners stay ~12%
  max_protein_residues: 1000    # truncate per-residue target (bank already ≤1000)
  ckpt_dir: ~/Desktop/autoRNA_data/tumbleweed/training_runs

model:
  d_model: 768
  nhead: 12
  num_layers: 8
  dim_ff: 3072
  dropout: 0.1
  embed_dim: 256
  max_len: 96
  target_embed_dim: 1280
  use_target_token: true
  target_pool: attn             # NEW: attention-pool over per-residue ESM-2 (epitope-aware)
  attn_pool_heads: 8
  grad_checkpoint: false

training:
  batch_size: 128               # larger batch → more in-batch negatives → stronger InfoNCE
  steps: 20000
  lr: 3.0e-4
  weight_decay: 0.05
  betas: [0.9, 0.95]
  grad_clip: 1.0
  amp: true
  lam_diff: 0.5
  mask_same_target: true        # supervised-InfoNCE: drop within-batch same-target false negatives
  ckpt_every: 2500
