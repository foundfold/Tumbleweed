run_id: tumbleweed_60m_diffusion_v5_film

# v5 = v2_kdbench + FiLM conditioning. SINGLE-VARIABLE test of the architecture hypothesis.
# Both prior conditioning levers failed by the SAME mechanism: v3 (winner rebalance) and v4
# (epitope attn-pool) both drove Lc→0 while the DENOISER ignored the target (own−zero ≤ 0).
# Diagnosis: the target is a single PREPENDED token + the InfoNCE head absorbs all target-
# discrimination signal, so the denoiser learns to ignore position-0 (it recovers winners from
# sequence patterns alone). The lever is therefore the conditioning ARCHITECTURE, not the
# embedding / pooling.
#
# FIX (model.target_film=true): the projected target rep generates per-layer (γ,β) that modulate
# the denoiser trunk after every transformer layer (h ← γ⊙h + β). The denoise-loss gradient now
# MUST flow through the target pathway. Zero-init film → γ=1,β=0 at start (residual-safe no-op,
# verified max|Δlogits|=0 vs no-FiLM). +9.4M params (60.9M → 70.4M).
#
# Everything else identical to v2 (the current BEST): mean-pool, CENTERED ESM-2 bank,
# supervised-InfoNCE. Data balance reproduces v2's winning ~12%-winner mix under the now-fixed
# per-FAMILY cap (max_rows_per_family=50000 keeps ~all deep SELEX; copying v2's literal 5000
# would instead give v3's regressed 47%-winner regime). Held-out LOX1/CXCL5 still NOT in the pool.
data:
  families:
  - name: rapt_tg2
    rounds_glob: ~/Desktop/autoRNA_data/tumbleweed/raptranker/PRJDB9110_TG2/processed/DRR*.parquet
    target_uniprot: P21980      # TGM2
    chemistry: RNA
    r_max: 8

  - name: rapt_a
    rounds_glob: ~/Desktop/autoRNA_data/tumbleweed/raptscore_selex/processed/A_R*.parquet
    target_uniprot: P31371      # FGF9
    chemistry: RNA
    r_max: 6

  - name: rapt_b
    rounds_glob: ~/Desktop/autoRNA_data/tumbleweed/raptscore_selex/processed/B_R*.parquet
    target_uniprot: Q01638      # IL1RL1
    chemistry: RNA
    r_max: 7

  - name: rapt_c
    rounds_glob: ~/Desktop/autoRNA_data/tumbleweed/raptscore_selex/processed/C_R*.parquet
    target_uniprot: P31371      # FGF9 (independent campaign)
    chemistry: RNA
    r_max: 7

  - name: rapidselex_parp1
    rounds_glob: ~/Desktop/autoRNA_data/tumbleweed/rapidselex/processed/rapidselex_PARP1_R*.parquet
    target_uniprot: P09874      # PARP1
    chemistry: RNA
    r_max: 12

  - name: rapidselex_mecp2
    rounds_glob: ~/Desktop/autoRNA_data/tumbleweed/rapidselex/processed/rapidselex_MECP2_R*.parquet
    target_uniprot: P51608      # MECP2
    chemistry: RNA
    r_max: 12

  - name: alphasyn_s1
    rounds_glob: ~/Desktop/autoRNA_data/tumbleweed/alphasyn/processed/alphasyn_S1_R*.parquet
    target_uniprot: P37840      # SNCA (alpha-synuclein); 2'F-pyrimidine RNA
    chemistry: RNA
    r_max: 15

  target_embeddings_parquet: ~/Tumbleweed/data_refs/target_protein_embeddings_centered.parquet
  winners_parquet: ~/Tumbleweed/data_refs/kdbench_winners_hybrid.parquet
  winner_round: 4               # → t = 1 - 4/5 = 0.2 (mild noise; converged binders)
  winner_r_max: 5
  winner_repeat: 50             # ~630 binders × 50 = ~31.5k rows ≈ 12% of corpus (v2 balance)
  max_rows_per_family: 50000    # high cap → keep ~all deep SELEX (~240k) so winners stay ~12%
  ckpt_dir: ~/Desktop/autoRNA_data/tumbleweed/training_runs

model:
  d_model: 768
  nhead: 12
  num_layers: 8
  dim_ff: 3072
  dropout: 0.1
  embed_dim: 256
  max_len: 96
  target_embed_dim: 1280
  use_target_token: true
  target_film: true             # NEW: per-layer FiLM γ/β from the target → forces denoiser dependence
  grad_checkpoint: false

training:
  batch_size: 128
  steps: 20000
  lr: 3.0e-4
  weight_decay: 0.05
  betas: [0.9, 0.95]
  grad_clip: 1.0
  amp: true
  lam_diff: 0.5
  mask_same_target: true        # supervised-InfoNCE: drop within-batch same-target false negatives
  ckpt_every: 2500
