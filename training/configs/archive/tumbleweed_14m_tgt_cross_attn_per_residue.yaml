# Tumbleweed 14M smoke — sliding round-window curriculum + regression head.
#
# Tests three things at once on a fast 14M model:
#   1. Sliding round-window curriculum (round_frac-driven, no manual tags).
#      Phase 0: top rounds vs naive/R0.  Phase 3: top rounds vs late-but-not-top.
#      Each phase narrows the affinity gap between negatives and positives.
#   2. Regression head: predict round_frac per sequence alongside InfoNCE.
#      Multi-task loss L = NCE + reg_loss_weight * MSE. Lets the model learn
#      the continuous affinity gradient SELEX rounds carry, instead of treating
#      every late-round read as binary "good" vs "bad".
#   3. C_R5 duplicate bug from v1 — gone here, every source declares one
#      round_frac and is used in whichever window it falls into.
#
# If this run hits Pearson on Dataset A > prior 14M (~0.73), scale to 300M.

run_id: tumbleweed_14m_tgt_cross_attn_per_residue
seed: 0

curriculum:
  enabled: true
  phases:
    # window width ~0.25, slide ~0.2 per phase. pos pool tightens at the end
    # so we don't overlap with the rising neg window.
    - {start_step: 0,    pos_frac: [0.80, 1.00], neg_frac: [0.00, 0.20]}
    - {start_step: 1250, pos_frac: [0.80, 1.00], neg_frac: [0.20, 0.45]}
    - {start_step: 2500, pos_frac: [0.80, 1.00], neg_frac: [0.40, 0.65]}
    - {start_step: 3750, pos_frac: [0.90, 1.00], neg_frac: [0.55, 0.75]}

data:
  sources:
    # ─── Naive / R0 (round_frac = 0.0) ────────────────────────────────────────
    - {name: jolma_r0,        parquet: ~/Desktop/autoRNA_data/tumbleweed/jolma2013/jolma2013_combined.parquet,                    round_filter: '== 0', class: r0, weight: 1.0, round_frac: 0.0}
    - {name: tier1_r0,        parquet: ~/Desktop/autoRNA_data/tumbleweed/tier1/tier1_combined.parquet,                            round_filter: '== 0', class: r0, weight: 1.0, round_frac: 0.0}
    - {name: rapt_tg2_r0,     parquet: ~/Desktop/autoRNA_data/tumbleweed/raptranker/PRJDB9110_TG2/processed/DRR201861.parquet,    round_filter: null,    class: r0, weight: 1.0, round_frac: 0.0, target_protein: TGM2}
    - {name: rapt_B_R0,       parquet: ~/Desktop/autoRNA_data/tumbleweed/raptscore_selex/processed/B_R0.parquet,                  round_filter: null,    class: r0, weight: 1.0, round_frac: 0.0, target_protein: IL1RL1}
    - {name: syn_r0_lox1,     parquet: ~/Desktop/autoRNA_data/tumbleweed/synthetic_r0/InstructNA_LOX1/synthetic_r0.parquet,        round_filter: null,    class: r0, weight: 0.3, round_frac: 0.0, target_protein: LOX1}
    - {name: syn_r0_cxcl5,    parquet: ~/Desktop/autoRNA_data/tumbleweed/synthetic_r0/InstructNA_CXCL5/synthetic_r0.parquet,       round_filter: null,    class: r0, weight: 0.3, round_frac: 0.0, target_protein: CXCL5}

    # ─── RaptScore Dataset A (6 rounds total) ─────────────────────────────────
    - {name: rapt_A_R1,  parquet: ~/Desktop/autoRNA_data/tumbleweed/raptscore_selex/processed/A_R1.parquet, class: r0,     weight: 1.0, weight_by_count: true, round_frac: 0.17, target_protein: FGF9}
    - {name: rapt_A_R2,  parquet: ~/Desktop/autoRNA_data/tumbleweed/raptscore_selex/processed/A_R2.parquet, class: r0,     weight: 1.0, weight_by_count: true, round_frac: 0.33, target_protein: FGF9}
    - {name: rapt_A_R3,  parquet: ~/Desktop/autoRNA_data/tumbleweed/raptscore_selex/processed/A_R3.parquet, class: r0,     weight: 1.0, weight_by_count: true, round_frac: 0.50, target_protein: FGF9}
    - {name: rapt_A_R4,  parquet: ~/Desktop/autoRNA_data/tumbleweed/raptscore_selex/processed/A_R4.parquet, class: r0,     weight: 1.0, weight_by_count: true, round_frac: 0.67, target_protein: FGF9}
    - {name: rapt_A_R5,  parquet: ~/Desktop/autoRNA_data/tumbleweed/raptscore_selex/processed/A_R5.parquet, class: r_late, weight: 1.5, weight_by_count: true, round_frac: 0.83, target_protein: FGF9}
    - {name: rapt_A_R6,  parquet: ~/Desktop/autoRNA_data/tumbleweed/raptscore_selex/processed/A_R6.parquet, class: r_late, weight: 2.0, weight_by_count: true, round_frac: 1.00, target_protein: FGF9}

    # ─── RaptScore Dataset B (7 rounds, R0-R7) ────────────────────────────────
    - {name: rapt_B_R1,  parquet: ~/Desktop/autoRNA_data/tumbleweed/raptscore_selex/processed/B_R1.parquet, class: r0,     weight: 1.0, weight_by_count: true, round_frac: 0.14, target_protein: IL1RL1}
    - {name: rapt_B_R2,  parquet: ~/Desktop/autoRNA_data/tumbleweed/raptscore_selex/processed/B_R2.parquet, class: r0,     weight: 1.0, weight_by_count: true, round_frac: 0.29, target_protein: IL1RL1}
    - {name: rapt_B_R3,  parquet: ~/Desktop/autoRNA_data/tumbleweed/raptscore_selex/processed/B_R3.parquet, class: r0,     weight: 1.0, weight_by_count: true, round_frac: 0.43, target_protein: IL1RL1}
    - {name: rapt_B_R4,  parquet: ~/Desktop/autoRNA_data/tumbleweed/raptscore_selex/processed/B_R4.parquet, class: r0,     weight: 1.0, weight_by_count: true, round_frac: 0.57, target_protein: IL1RL1}
    - {name: rapt_B_R5,  parquet: ~/Desktop/autoRNA_data/tumbleweed/raptscore_selex/processed/B_R5.parquet, class: r0,     weight: 1.0, weight_by_count: true, round_frac: 0.71, target_protein: IL1RL1}
    - {name: rapt_B_R6,  parquet: ~/Desktop/autoRNA_data/tumbleweed/raptscore_selex/processed/B_R6.parquet, class: r_late, weight: 1.5, weight_by_count: true, round_frac: 0.86, target_protein: IL1RL1}
    - {name: rapt_B_R7,  parquet: ~/Desktop/autoRNA_data/tumbleweed/raptscore_selex/processed/B_R7.parquet, class: r_late, weight: 2.0, weight_by_count: true, round_frac: 1.00, target_protein: IL1RL1}

    # ─── RaptScore Dataset C (6 rounds, R2-R6) ────────────────────────────────
    - {name: rapt_C_R2,  parquet: ~/Desktop/autoRNA_data/tumbleweed/raptscore_selex/processed/C_R2.parquet, class: r0,     weight: 1.0, weight_by_count: true, round_frac: 0.33, target_protein: FGF9}
    - {name: rapt_C_R3,  parquet: ~/Desktop/autoRNA_data/tumbleweed/raptscore_selex/processed/C_R3.parquet, class: r0,     weight: 1.0, weight_by_count: true, round_frac: 0.50, target_protein: FGF9}
    - {name: rapt_C_R4,  parquet: ~/Desktop/autoRNA_data/tumbleweed/raptscore_selex/processed/C_R4.parquet, class: r0,     weight: 1.0, weight_by_count: true, round_frac: 0.67, target_protein: FGF9}
    - {name: rapt_C_R5,  parquet: ~/Desktop/autoRNA_data/tumbleweed/raptscore_selex/processed/C_R5.parquet, class: r_late, weight: 1.5, weight_by_count: true, round_frac: 0.83, target_protein: FGF9}
    - {name: rapt_C_R6,  parquet: ~/Desktop/autoRNA_data/tumbleweed/raptscore_selex/processed/C_R6.parquet, class: r_late, weight: 2.0, weight_by_count: true, round_frac: 1.00, target_protein: FGF9}

    # ─── RaptRanker TG2 (R0-R8, 8 rounds total beyond R0) ─────────────────────
    - {name: rapt_tg2_r2, parquet: ~/Desktop/autoRNA_data/tumbleweed/raptranker/PRJDB9110_TG2/processed/DRR201863.parquet, class: r0,     weight: 1.0, round_frac: 0.25, target_protein: TGM2}
    - {name: rapt_tg2_r3, parquet: ~/Desktop/autoRNA_data/tumbleweed/raptranker/PRJDB9110_TG2/processed/DRR201864.parquet, class: r0,     weight: 1.0, round_frac: 0.38, target_protein: TGM2}
    - {name: rapt_tg2_r4, parquet: ~/Desktop/autoRNA_data/tumbleweed/raptranker/PRJDB9110_TG2/processed/DRR201865.parquet, class: r0,     weight: 1.0, round_frac: 0.50, target_protein: TGM2}
    - {name: rapt_tg2_r5, parquet: ~/Desktop/autoRNA_data/tumbleweed/raptranker/PRJDB9110_TG2/processed/DRR201866.parquet, class: r0,     weight: 1.0, round_frac: 0.63, target_protein: TGM2}
    - {name: rapt_tg2_r6, parquet: ~/Desktop/autoRNA_data/tumbleweed/raptranker/PRJDB9110_TG2/processed/DRR201867.parquet, class: r0,     weight: 1.0, round_frac: 0.75, target_protein: TGM2}
    - {name: rapt_tg2_r7, parquet: ~/Desktop/autoRNA_data/tumbleweed/raptranker/PRJDB9110_TG2/processed/DRR201868.parquet, class: r_late, weight: 1.5, round_frac: 0.88, target_protein: TGM2}
    - {name: rapt_tg2_r8, parquet: ~/Desktop/autoRNA_data/tumbleweed/raptranker/PRJDB9110_TG2/processed/DRR201869.parquet, class: r_late, weight: 2.0, round_frac: 1.00, target_protein: TGM2}

    # ─── SPARK-seq target-conditional training (curated binders, round_frac=1.0) ───
    - {name: spark_PTK7,       parquet: ~/Desktop/autoRNA_data/tumbleweed/sparkseq/processed/sparkseq_train_PTK7.parquet,       class: r_late, weight: 1.5, weight_by_count: true, count_col: count, family_weighted: true, family_col: motif_family, family_weight_power: 0.5, round_frac: 1.0, target_protein: PTK7}
    - {name: spark_NRP1,       parquet: ~/Desktop/autoRNA_data/tumbleweed/sparkseq/processed/sparkseq_train_NRP1.parquet,       class: r_late, weight: 1.5, weight_by_count: true, count_col: count, family_weighted: true, family_col: motif_family, family_weight_power: 0.5, round_frac: 1.0, target_protein: NRP1}
    - {name: spark_CDCP1,      parquet: ~/Desktop/autoRNA_data/tumbleweed/sparkseq/processed/sparkseq_train_CDCP1.parquet,      class: r_late, weight: 1.5, weight_by_count: true, count_col: count, family_weighted: true, family_col: motif_family, family_weight_power: 0.5, round_frac: 1.0, target_protein: CDCP1}
    - {name: spark_ITGA3,      parquet: ~/Desktop/autoRNA_data/tumbleweed/sparkseq/processed/sparkseq_train_ITGA3.parquet,      class: r_late, weight: 1.5, weight_by_count: true, count_col: count, family_weighted: true, family_col: motif_family, family_weight_power: 0.5, round_frac: 1.0, target_protein: ITGA3}
    - {name: spark_PTPRD,      parquet: ~/Desktop/autoRNA_data/tumbleweed/sparkseq/processed/sparkseq_train_PTPRD_F_S.parquet, class: r_late, weight: 1.5, weight_by_count: true, count_col: count, family_weighted: true, family_col: motif_family, family_weight_power: 0.5, round_frac: 1.0, target_protein: PTPRD_F_S}
    # ─── Other late-round / curated (treated as round_frac = 1.0) ─────────────
    - {name: jolma_late,    parquet: ~/Desktop/autoRNA_data/tumbleweed/jolma2013/jolma2013_combined.parquet,                round_filter: '>= 3',  class: r_late, weight: 1.0, round_frac: 1.0}
    - {name: tier1_late,    parquet: ~/Desktop/autoRNA_data/tumbleweed/tier1/tier1_combined.parquet,                        round_filter: '>= 1',  class: r_late, weight: 1.0, round_frac: 1.0}
    - {name: deepaptamer,   parquet: ~/Desktop/autoRNA_data/tumbleweed/deepaptamer/processed/deepaptamer_combined.parquet,  sequence_col: aptamer_sequence_RNA, round_filter: null, class: r_late, weight: 2.0, round_frac: 1.0}
    - {name: utexas_strong, parquet: ~/Desktop/autoRNA_data/tumbleweed/utexas_db/processed/utexas_aptamer_db.parquet,       sequence_col: aptamer_sequence_clean, kd_filter_lt_nm: 1000, round_filter: null, class: r_late, weight: 3.0, round_frac: 1.0}

  eval_panel:
    parquet: ~/Desktop/autoRNA_data/tumbleweed/instructna_benchmark/processed/instructna_lox1_cxcl5_kd.parquet
    sequence_col: sequence

  target_embeddings_parquet: /home/ubuntu/Tumbleweed/data_refs/target_protein_embeddings_per_residue.parquet
  test_exclusion_parquet: /home/ubuntu/Tumbleweed/data_refs/aptamer_splits_v2.parquet

  max_len: 128
  shuffle_buffer: 50000
  num_workers: 0

model:
  target_cond_mode: cross_attn_per_residue
  target_embed_dim: 1280
  d_model: 384
  nhead: 6
  num_layers: 8
  dim_ff: 1536
  embed_dim: 192
  dropout: 0.1
  grad_checkpoint: false
  regression_head: true

training:
  batch_size: 64
  steps: 5000
  warmup_steps: 200
  lr: 3.0e-4
  weight_decay: 0.05
  betas: [0.9, 0.95]
  grad_clip: 1.0
  tau: 0.2
  amp: true
  reg_loss_weight: 0.5    # L = NCE + 0.5 * MSE; balanced from prior 14M sweep on regression-only baseline
  ddp: auto
  compile: false

eval:
  every_steps: 1000
  retrieval_panel: instructna_lox1_cxcl5
  metrics: [retrieval_R@1, retrieval_R@10, kd_spearman]

ckpt:
  every_steps: 2500
  keep_last: 2
  resume_from: null

log:
  every_steps: 50
  to: stdout
